# Roguelike 全局配置

storage:
  # 可选: json 或 sqlite
  type: json
  # SQLite 文件路径，相对于 plugins/Roguelike 目录
  sqlite-file: roguelike.db
  # 定期保存间隔 (ticks)，20 ticks = 1 秒。最低 600 ticks。
  save-interval: 1200
  # 开启后定期保存会在异步线程写入磁盘，降低主线程 IO 抖动。
  async-save: true
  backup:
    # 自动备份玩家数据到 plugins/Roguelike/backups/player-data-*.zip
    enabled: true
    # 备份间隔（分钟），最低 10 分钟。
    interval-minutes: 60
    # 保留最近多少份备份。
    keep: 24

debug:
  # 开启后会在控制台输出更多开发调试日志，包括玩家破坏方块、吃东西、升级、击杀和用券
  enabled: false

content:
  github-sync:
    # 开启后启动或 /rw reload 时会从 GitHub/raw 地址拉取内容 YAML 到 plugins/Roguelike/content/。
    # 默认打开；base-url 为空时不会发起网络请求，适合仅使用本地 content 目录。
    enabled: true
    # 示例: https://raw.githubusercontent.com/TecoStudio/minerogue-content/main/content
    base-url: ""
    # 需要拉取的相对路径。路径会写入 plugins/Roguelike/content/<相对路径>。
    files:
      - weapons/echo_blade.yml
      - weapons/ember_knife.yml
      - weapons/excited_stone_sword.yml
      - weapons/flame_sword.yml
      - weapons/frost_cleaver.yml
      - weapons/glass_cannon_hammer.yml
      - weapons/hunter_bow.yml
      - weapons/inferno_greatsword.yml
      - weapons/phase_scythe.yml
      - weapons/plague_saber.yml
      - weapons/rusty_iron_sword.yml
      - weapons/special_weapon.yml
      - weapons/storm_spear.yml
      - weapons/thunder_axe.yml
      - weapons/vampire_dagger.yml
      - weapons/whirlwind_blade.yml
      - weapons/wooden_sword.yml
      - items/burger.yml
      - items/greater_healing_potion.yml
      - items/healing_potion.yml
      - items/iron_skin_tonic.yml
      - items/swift_tonic.yml
      - armor/explosive_boots.yml
      - armor/explosive_chestplate.yml
      - armor/explosive_helmet.yml
      - armor/explosive_leggings.yml
      - armor/swift_boots.yml
      - armor/swift_chestplate.yml
      - armor/swift_helmet.yml
      - armor/swift_leggings.yml
      - armor/thorns_boots.yml
      - armor/thorns_chestplate.yml
      - armor/thorns_helmet.yml
      - armor/thorns_leggings.yml
      - mobs/blood-zombie.yml
      - mobs/drowned.yml
      - mobs/exp-blaze.yml
      - mobs/exp-creeper.yml
      - mobs/exp-ender_dragon.yml
      - mobs/exp-enderman.yml
      - mobs/exp-skeleton.yml
      - mobs/exp-spider.yml
      - mobs/exp-warden.yml
      - mobs/exp-wither.yml
      - mobs/exp-zombie.yml
      - mobs/husk.yml
      - mobs/pillager.yml
      - mobs/settings.yml
      - mobs/skeleton-elite.yml
      - mobs/spider-elite.yml
      - mobs/vagrant.yml
      - mobs/zombie-elite.yml
      - mobs/zombified_piglin.yml
    # true = 每次同步覆盖本地同名文件；false = 本地文件存在时跳过。
    overwrite-existing: true

gameplay:
  mana:
    # 插件接管原版经验条作为法力条。经验等级数字显示当前法力值，经验条显示法力百分比。
    max: 100.0
    regen-per-second: 1.0
  # 怪物击杀经验倍率。0 = 关闭击杀经验，2.0 = 双倍经验。
  exp-multiplier: 1.0
  # 挖矿/进食里程碑经验倍率。未配置时建议与击杀经验分开调节。
  progression-exp-multiplier: 1.0
  # 所有随机武器掉落概率倍率。默认 0 = 怪物不掉落插件随机武器；改为 1.0 后使用下方基础概率。
  weapon-drop-multiplier: 0.0
  # 随机武器基础掉落概率，最终概率 = 此处概率 * weapon-drop-multiplier。
  weapon-drop-chances:
    legendary: 0.002
    epic: 0.005
    rare: 0.010
    common: 0.020

integrations:
  placeholderapi:
    enabled: false
  tab:
    # 启用后建议关闭内置 scoreboard，并在 TAB 中使用 PlaceholderAPI 占位符
    enabled: false
  commandapi:
    # 当前为兼容检测；未安装时自动回退到 Bukkit 命令
    enabled: false
  mythicmobs:
    # 启用后使用 MythicMobs 怪物系统；本插件内置怪物不会自然生成
    enabled: false
  nova:
    # 启用后武器 item 可填写 nova:<namespace>:<id>
    enabled: false

scoreboard:
  # 是否启用内置侧边栏与 Tab 列表；默认开启，不需要外部展示插件即可使用
  enabled: true
  # 更新间隔 (ticks)
  update-interval: 20
