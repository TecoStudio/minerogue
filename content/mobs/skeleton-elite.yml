type: internal
id: skeleton-elite
# Internal mobs are assembled from a vanilla template plus reusable action blocks.
# No Java preset ID or legacy combat script is used here: this YAML is the mob definition.
template: skeleton
aliases:
  - skeleton_elite
enabled: true
spawnable: true
spawn-chance: 0.12
name: '&c骷髅精英'
health: 30.0
damage: 5.0
weapon-template: rusty_iron_sword
detect-range: 18.0
skill-range: 3.2
skill-cooldown-ticks: 100
skill-damage: 5.0
actions:
  # Keep vanilla skeleton bow AI as the fallback behavior from template: skeleton.
  # When a player gets close, run a reusable three-hit melee burst block.
  - when: target_close
    do: melee-burst
    hits: 3
  # After the melee burst, push away from the target so vanilla skeleton ranged AI can resume.
  - when: after melee-burst
    do: retreat
